services:
  db:
    image: mysql:8.4
    container_name: smart-ordering-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smart_ordering
      MYSQL_USER: smart_user
      MYSQL_PASSWORD: smart_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: smart-ordering-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: local-dev-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DB_NAME: smart_ordering
      DB_USER: smart_user
      DB_PASSWORD: smart_pass
      DB_HOST: db
      DB_PORT: 3306
      GEMINI_CLI_COMMAND: ${GEMINI_CLI_COMMAND:-gemini}
      GEMINI_CLI_MODEL: ${GEMINI_CLI_MODEL:-gemini-2.5-flash}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ${USERPROFILE}/.gemini:/root/.gemini
    command: sh /app/entrypoint.sh

  admin-frontend:
    build:
      context: ./admin-frontend
    container_name: smart-ordering-admin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./admin-frontend:/app
      - admin_frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  customer-frontend:
    build:
      context: ./customer-frontend
    container_name: smart-ordering-customer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:5174"
    volumes:
      - ./customer-frontend:/app
      - customer_frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: smart-ordering-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: smart_user
      PMA_PASSWORD: smart_pass
      PMA_CONFIG_BASE64: 
    ports:
      - "8080:80"

volumes:
  db_data:
  admin_frontend_node_modules:
  customer_frontend_node_modules:
